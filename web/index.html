<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Akash Kumar — Senior Flutter Developer | Firebase Expert | API Specialist | UI/UX Engineer. Building beautiful, high-performance cross-platform apps.">
  <meta name="keywords"
    content="Flutter Developer, Firebase, Dart, Mobile App Developer, Flutter Web, UI/UX, Akash Kumar">
  <meta name="author" content="Akash Kumar">

  <!-- Open Graph -->
  <meta property="og:title" content="Akash Kumar — Senior Flutter Developer">
  <meta property="og:description"
    content="Crafting beautiful, high-performance Flutter applications with Firebase backend.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://akashkumar.dev">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Akash Kumar — Flutter Developer">
  <meta name="twitter:description" content="Senior Flutter Developer | Firebase Expert | UI/UX Engineer">

  <!-- iOS meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Akash Kumar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Akash Kumar — Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Fonts preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #050A14;
      font-family: 'Inter', sans-serif;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050A14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader-logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #00D4FF, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .loader-bar {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-progress {
      height: 100%;
      background: linear-gradient(90deg, #00D4FF, #7C3AED);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        width: 0%;
        margin-left: 0;
      }

      50% {
        width: 60%;
        margin-left: 20%;
      }

      100% {
        width: 0%;
        margin-left: 100%;
      }
    }

    .loader-text {
      margin-top: 16px;
      color: rgba(148, 163, 184, 0.7);
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <!-- 🔥 CACHE FIX: REMOVE OLD SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-logo">AK.</div>
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
    <div class="loader-text">LOADING PORTFOLIO...</div>
  </div>

  <!-- Flutter Bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Hide Loader -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 500);
      }
    });
  </script>

</body>

</html>
