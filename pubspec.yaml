name: akash_portfolio
description: "Akash Kumar - Senior Flutter Developer Portfolio"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_auth: ^5.3.1

  # Utilities
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  visibility_detector: ^0.4.0+2
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/resume/
